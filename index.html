<script>
    
 // 1. Menu Toggle Logic
function toggleMenu() {
    let menu = document.getElementById("myDropdown");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

// 2. Updated Copy & Save Logic
function copyTags() {
    const text = document.getElementById('hashtagOutput').innerText;
    const topic = document.getElementById('topicSelect').value || "Viral Tags";
    
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
        // --- SAVE TO LOCALSTORAGE ---
        let history = JSON.parse(localStorage.getItem("pago_vibe_history")) || [];
        history.unshift({ text: text, cat: topic, time: new Date().toLocaleString() });
        localStorage.setItem("pago_vibe_history", JSON.stringify(history));

        // Show Notification
        const toast = document.getElementById("notification");
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 3000);
        if (navigator.vibrate) navigator.vibrate(100);
    });
}


   // 3. Open Modal and Show Saved Tags (Alert Hataya Gaya)
function openSavedModal() {
    document.getElementById("myDropdown").style.display = "none";
    document.getElementById("savedModal").style.display = "flex";
    
    const listArea = document.getElementById("modalListArea");
    const savedItems = JSON.parse(localStorage.getItem("pago_vibe_history")) || [];
    
    if(savedItems.length === 0) {
        listArea.innerHTML = "<p style='text-align:center; color:gray; padding:20px;'>Abhi tak kuch save nahi kiya!</p>";
        return;
    }

    listArea.innerHTML = savedItems.map((item, index) => `
        <div style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #1e293b;">
            <div style="font-size:12px; color:#00ff88; margin-bottom:5px;">📂 ${item.cat} (${item.time})</div>
            <div style="font-size:14px; color:#f1f5f9; white-space:pre-wrap; margin-bottom:10px;">${item.text}</div>
            <button onclick="navigator.clipboard.writeText(\`${item.text}\`); if(navigator.vibrate) navigator.vibrate(50);" 
                    style="width:100%; padding:8px; background:#3b82f6; color:white; border:none; border-radius:8px; cursor:pointer; font-size:12px;">
                COPY AGAIN
            </button>
        </div>
    `).join("");

}

function closeSavedModal() { document.getElementById("savedModal").style.display = "none"; }

function clearAllData() {
    if(confirm("Kya aap saara saved data delete karna chahte hain?")) {
        localStorage.removeItem("pago_vibe_history");
        location.reload();
    }
}

// Global click to close menu
window.onclick = function(event) {
    if (!event.target.matches('[onclick="toggleMenu()"]')) {
        document.getElementById("myDropdown").style.display = "none";
    }
}

    function processTags(source) {
        let allTags = source.split(" ");
        // Fisher-Yates shuffle logic
        for (let i = allTags.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allTags[i], allTags[j]] = [allTags[j], allTags[i]];
        }
        let selected15 = allTags.slice(0, 15);
        document.getElementById('hashtagOutput').innerText = selected15.join(" ");
        document.getElementById('tagDisplay').style.display = "block";
        if (navigator.vibrate) navigator.vibrate(50);
    }

    // Function for Category Picker
    function generateSmartTags() {
        const selected = document.getElementById('topicSelect').value;
        if (selected === "") {
            processTags(trendingLibrary);
        } else {
            processTags(proLibrary[selected]);
        }
    }

    // Function for Viral Button ONLY
    function generateViralOnly() {
        processTags(trendingLibrary);
        document.getElementById('topicSelect').value = ""; // Reset dropdown
    }

    // Is function ko purane copyTags ki jagah replace kar dein
function copyTags() {
    const text = document.getElementById('hashtagOutput').innerText;
    const topicSelect = document.getElementById('topicSelect');
    const topicText = topicSelect.options[topicSelect.selectedIndex].text;
    
    if (!text || text === "") return;

    navigator.clipboard.writeText(text).then(() => {
        // --- SAVE TO LOCALSTORAGE LOGIC ---
        let history = JSON.parse(localStorage.getItem("pago_vibe_history")) || [];
        
        // Naya data add karna
        history.unshift({ 
            text: text, 
            cat: topicText, 
            time: new Date().toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' }) 
        });

        // Limit history to 20 items only
        if(history.length > 20) history.pop();

        localStorage.setItem("pago_vibe_history", JSON.stringify(history));

        // Show Notification
        const toast = document.getElementById("notification");
        toast.className = "show";
        setTimeout(() => { toast.className = "notification"; }, 3000);
        
        if (navigator.vibrate) navigator.vibrate(100);
    }).catch(err => {
        console.error('Copy failed', err);
    });
}
